        <div style="position: absolute; top: 35%; left: 43%; transform: translate(-50%, -50%); color: white; font-family: 'Press Start 2P', cursive; font-size: 12px; text-shadow: 2px 2px #000; padding: 10px; pointer-events: none;">SETTINGS</div>
    </div>
    
    <div id="mini-window-text">You're in. Good.

Don't waste time.

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(660,660);

const gameContainer = document.getElementById('game-container');
gameContainer.appendChild(renderer.domElement);

const texture = new THREE.TextureLoader().load("assets/lockscreen.png");
const desktopTexture = new THREE.TextureLoader().load("assets/screen.png");
const desktop2Texture = new THREE.TextureLoader().load("assets/screen2.png");
const timedOutTexture = new THREE.TextureLoader().load("assets/timedOut.png");
let hasClosedMiniWindow = false;
let failureCount = 0;

const material = new THREE.ShaderMaterial({

uniforms:{
tDiffuse:{value:texture},
time:{value:0},
uIsLockscreen:{value:1.0},
uIsTimedOut:{value:0.0},
uShake:{value:0.0}
},

vertexShader:`

varying vec2 vUv;

void main(){
vUv = uv;
gl_Position = vec4(position,1.0);
}

`,

fragmentShader:`

uniform sampler2D tDiffuse;
uniform float time;
uniform float uIsLockscreen;
uniform float uIsTimedOut;
uniform float uShake;
varying vec2 vUv;

void main(){

vec2 uv = vUv;

/* Screen Shake (only when uShake > 0) */
uv.x += (sin(time * 100.0) * 0.005) * uShake;

/* CRT barrel distortion */
vec2 center = uv - 0.5;
float dist = dot(center,center);
uv += center * dist * 0.3;

/* Glitch effect */
if (uIsTimedOut > 0.5) {
     float glitchTime = time * 10.0;
     float noise = fract(sin(dot(vec2(floor(uv.y * 20.0), floor(glitchTime)), vec2(12.9898, 78.233))) * 43758.5453);
     if (noise > 0.98) {
         uv.x += (fract(sin(glitchTime) * 43758.5453) - 0.5) * 0.03;
     }
}

/* chromatic aberration */
float aberration = 0.002;
if (uIsTimedOut > 0.5) {
    aberration = 0.003 + 0.002 * sin(time * 10.0);
}

float r = texture2D(tDiffuse, uv + vec2(aberration,0)).r;
float g = texture2D(tDiffuse, uv).g;
float b = texture2D(tDiffuse, uv - vec2(aberration,0)).b;

vec3 color = vec3(r,g,b);

/* scanlines */
float scan = sin(uv.y*800.0)*0.04;
color -= scan;

/* vignette */
float vig = smoothstep(0.8,0.2,length(vUv-0.5));
color *= vig;

/* flicker */
color *= 1.0 + sin(time*40.0)*0.01;

/* Red light glow on lockscreen */
if (uIsLockscreen > 0.5) {
    float distToLight = distance(uv, vec2(0.88, 0.90));
    float glow = 1.0 - smoothstep(0.0, 0.04, distToLight);
    glow *= 0.4 + 0.2 * sin(time * 6.0);
    color += vec3(glow, 0.0, 0.0);

    /* Orange balls glow */
    vec3 tColor = texture2D(tDiffuse, uv).rgb;
    // Orange is high Red, medium Green, low Blue
    float isOrange = smoothstep(0.6, 1.0, tColor.r) * smoothstep(0.2, 0.55, tColor.g) * (1.0 - smoothstep(0.6, 1.0, tColor.g)) * (1.0 - smoothstep(0.1, 0.4, tColor.b));
    float orangePulse = 0.8 + 0.4 * sin(time * 4.0);
    // Add orange glow (Red + partial Green)
    color += vec3(isOrange * orangePulse * 1.5, isOrange * orangePulse * 0.2, 0.0);
}

gl_FragColor = vec4(color,1.0);

}

`
});

const geometry = new THREE.PlaneGeometry(2,2);
const mesh = new THREE.Mesh(geometry,material);

scene.add(mesh);

const terminalTexture = new THREE.TextureLoader().load("assets/terminal.png");
const textFileTexture = new THREE.TextureLoader().load("assets/textfile.png");
const folderGreenTexture = new THREE.TextureLoader().load("assets/folderGreen.png");
const folderRedTexture = new THREE.TextureLoader().load("assets/folderRed.png");
const folderYellowTexture = new THREE.TextureLoader().load("assets/folderYellow.png");
const pcTexture = new THREE.TextureLoader().load("assets/pc.png");
const pcLockedTexture = new THREE.TextureLoader().load("assets/pcLocked.png");

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let currentScreen = 'intro'; // Start with intro

const passwordInput = document.getElementById('password-input');
const passwordDisplay = document.getElementById('password-display');
const passwordLabel = document.getElementById('password-label');
const clockElement = document.getElementById('clock');
const adminPanel = document.getElementById('admin-panel');
const accessBtn = document.getElementById('access-btn');
const pcLabels = document.getElementById('pc-labels');
const introScreen = document.getElementById('intro-screen');
const introTextElement = document.getElementById('intro-text');
const continueHint = document.getElementById('continue-hint');

// Intro Typing Effect
const fullIntroText = `Your contact, Devjith,
was a data analyst at
NEXUS CORP.

Devjith discovered the company
has been running a mass
surveillance operation on
thousands of people and
selling the data.

Before being arrested on
fabricated charges, Devjith
managed to hide the
evidence deep inside
the company's system.

You have remote access
to a NEXUS CORP terminal.

Find the evidence.
Expose the company.
Free Devjith.

USE DEV TOOLS TO SURVIVE.`;

let charIndex = 0;

function typeWriter() {
    if (charIndex >= fullIntroText.length) {
        // Ensure explicit finish
        continueHint.style.visibility = 'visible';
        return; 
    }
    
    // Check if we manually skipped
    if (introTextElement.textContent.length === fullIntroText.length) {
         continueHint.style.visibility = 'visible';
         return;
    }

    introTextElement.textContent += fullIntroText.charAt(charIndex);
    
    // Play typing sound (check for spaces to avoid too much noise?)
    if (fullIntroText.charAt(charIndex) !== ' ' && fullIntroText.charAt(charIndex) !== '\n') {
        playSound('type');
    }

    charIndex++;
    
    let delay = 35;
    // Pause longer on periods or new lines for natural feel
    if (fullIntroText.charAt(charIndex-1) === '.' || fullIntroText.charAt(charIndex-1) === '\n') {
        delay = 150;
    }

    setTimeout(typeWriter, delay);
}

// System Boot / Start Logic
let isSystemBooted = false;

// Initial Prompt
introTextElement.textContent = "> SYSTEM DETECTED.\n> CLICK TO INITIALIZE CONNECTION_";
introTextElement.style.animation = "blink 1s infinite"; // Re-use blink animation? No, keyframes are scope-ish. 
// Just explicit blinking handle?
introTextElement.style.cursor = "pointer";

// Handle Intro/Start Click
introScreen.addEventListener('click', (e) => {
    e.stopPropagation(); // prevent window click
    
    // 1. Boot System (First Click)
    if (!isSystemBooted) {
        isSystemBooted = true;
        
        // Resume Audio
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().catch(e => console.log(e));
        }

        // Clear prompt and start story
        introTextElement.style.animation = "none";
        introTextElement.style.cursor = "default";
        introTextElement.textContent = "";
        setTimeout(typeWriter, 500);
        return;
    }

    // 2. Skip Typing (Second Click)
    if (charIndex < fullIntroText.length) {
        // Ensure explicit finish
        continueHint.style.visibility = 'visible';
        
        // Prevent typing loop from continuing
        charIndex = fullIntroText.length; 
        
        introTextElement.textContent = fullIntroText;
        return; 
    }

    // 3. Enter Game (Third Click)
    // Play sound initially
    playSound('type'); 
    
    // Fade out intro text (CSS transition handles this)
    introScreen.style.opacity = '0';
    introScreen.style.pointerEvents = 'none';

    // Start Lockscreen UI fade-in slightly BEFORE the zoom finishes for a seamless transition
    setTimeout(() => {
        passwordLabel.style.display = 'block';
        passwordInput.style.display = 'block';
        
        // Trigger reflow to ensure display:block applies before opacity transition
        void passwordLabel.offsetWidth; 
        
        // Apply opacity 1 to fade in
        passwordLabel.style.opacity = '1';
        passwordDisplay.style.opacity = '1';
        
        const clockElem = document.getElementById('clock');
        if(clockElem) clockElem.style.opacity = '1';
        
    }, 1000); // 1.0s into the 1.5s zoom

    // Remove intro overlay completely after it has faded out
    setTimeout(() => {
        introScreen.style.display = 'none';
        
        passwordInput.disabled = false;
        passwordInput.focus();
    }, 1600); // 1.6s ensures fade out (1.5s) is fully complete

    // Start Zoom Animation
    let startTime = Date.now();
    const zoomDuration = 1500; // ms

    // Initial scale (very small, far away)
    mesh.scale.set(0.01, 0.01, 1);
    
    // Set state to lockscreen so CRT effects render
    currentScreen = 'lockscreen';
    
    function zoomIn() {
        let elapsed = Date.now() - startTime;
        let t = Math.min(elapsed / zoomDuration, 1);
        
        // Quartic ease out for a much smoother "arriving" feeling
        const ease = 1 - Math.pow(1 - t, 4); 
        
        const scale = 0.01 + (0.99 * ease);
        mesh.scale.set(scale, scale, 1);
        
        if (elapsed < zoomDuration) {
            requestAnimationFrame(zoomIn);
        } else {
            // Animation Done
            mesh.scale.set(1, 1, 1);
            // UI shown via setTimeout above
        }
    }
    
    zoomIn();
});

let isPcUnlocked = false;

// --- Audio System ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
let isBgmPlaying = false;

function startBgm() {
    // BGM Removed as requested
}

// Resume AudioContext on any interaction to prevent delay on first sound
const resumeAudio = () => {
    if (audioCtx.state === 'suspended') {
        audioCtx.resume().catch(e => console.log('Auto-play prevented by browser', e));
    }
    // startBgm(); // Disabled
};

// Attempt to start immediately (if browser policy allows)
resumeAudio();

window.addEventListener('click', resumeAudio);
window.addEventListener('keydown', resumeAudio);
window.addEventListener('mousemove', resumeAudio);
window.addEventListener('focus', resumeAudio);

function playSound(type) {
    if (audioCtx.state === 'suspended') {
        audioCtx.resume().catch(() => {});
    }
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    // ... rest of function default ...
    
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    const now = audioCtx.currentTime;

    if (type === 'open') {
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(600, now);
        oscillator.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
        gainNode.gain.setValueAtTime(0.1, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        oscillator.start(now);
        oscillator.stop(now + 0.1);
    } else if (type === 'close') {
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(1200, now);
        oscillator.frequency.exponentialRampToValueAtTime(600, now + 0.1);
        gainNode.gain.setValueAtTime(0.1, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        oscillator.start(now);
        oscillator.stop(now + 0.1);
    } else if (type === 'type') {
        oscillator.type = 'triangle';
        oscillator.frequency.setValueAtTime(800, now);
        gainNode.gain.setValueAtTime(0.05, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
        oscillator.start(now);
        oscillator.stop(now + 0.03);
    } else if (type === 'delete') {
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(300, now);
        gainNode.gain.setValueAtTime(0.05, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        oscillator.start(now);
        oscillator.stop(now + 0.05);
    } else if (type === 'success') {
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(400, now);
        oscillator.frequency.setValueAtTime(800, now + 0.1);
        gainNode.gain.setValueAtTime(0.05, now);
        gainNode.gain.linearRampToValueAtTime(0.05, now + 0.1);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        oscillator.start(now);
        oscillator.stop(now + 0.3);
    } else if (type === 'power_off') {
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(200, now);
        oscillator.frequency.exponentialRampToValueAtTime(50, now + 0.4);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        oscillator.start(now);
        oscillator.stop(now + 0.4);
    } else if (type === 'error') { // Changed: Added error sound
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(150, now);
        oscillator.frequency.linearRampToValueAtTime(100, now + 0.1);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        oscillator.start(now);
        oscillator.stop(now + 0.15);
    } else if (type === 'access_granted') { 
        oscillator.type = 'triangle';
        oscillator.frequency.setValueAtTime(600, now);
        oscillator.frequency.linearRampToValueAtTime(1200, now + 0.1);
        gainNode.gain.setValueAtTime(0.1, now);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        oscillator.start(now);
        oscillator.stop(now + 0.3);
    } else if (type === 'glitch') {
        oscillator.type = 'sawtooth';
        // Glitchy noise sequence
        oscillator.frequency.setValueAtTime(100, now);
        oscillator.frequency.linearRampToValueAtTime(800, now + 0.1);
        oscillator.frequency.linearRampToValueAtTime(50, now + 0.2);
        oscillator.frequency.linearRampToValueAtTime(400, now + 0.3);
        
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.linearRampToValueAtTime(0.0, now + 0.05);
        gainNode.gain.linearRampToValueAtTime(0.2, now + 0.1);
        gainNode.gain.linearRampToValueAtTime(0.0, now + 0.15);
        gainNode.gain.linearRampToValueAtTime(0.2, now + 0.2);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        
        oscillator.start(now);
        oscillator.stop(now + 0.5);
    }
}

let deadSoundOscillator = null;
let deadSoundGain = null;

function startDeadSound() {
    if (deadSoundOscillator) return;

    deadSoundOscillator = audioCtx.createOscillator();
    deadSoundGain = audioCtx.createGain();

    deadSoundOscillator.type = 'sine';
    deadSoundOscillator.frequency.setValueAtTime(2000, audioCtx.currentTime);

    deadSoundGain.gain.setValueAtTime(0, audioCtx.currentTime);
    deadSoundGain.gain.linearRampToValueAtTime(0.005, audioCtx.currentTime + 2.0); // Slow fade in, very quiet

    deadSoundOscillator.connect(deadSoundGain);
    deadSoundGain.connect(audioCtx.destination);
    
    deadSoundOscillator.start();
}

function playJimboSound() {
    const audio = new Audio('assets/jimbo.mp3');
    audio.play().catch(e => console.error("Error playing jimbo sound:", e));
}
// --------------------

// When Access Button is clicked (only works if enabled via devtools)
accessBtn.addEventListener('click', (e) => {
    e.stopPropagation(); // Prevent raycaster on canvas
    if (!accessBtn.disabled) {
        playSound('access_granted');
        material.uniforms.tDiffuse.value = pcTexture;
        currentScreen = 'pc';
        adminPanel.style.display = 'none';
        isPcUnlocked = true;
    }
});

function updateClock() {
    const now = new Date();
    let hours = now.getHours();
    const isAm = hours < 12;
    hours = hours % 12;
    hours = hours ? hours : 12; // the hour '0' should be '12'
    const minutes = now.getMinutes().toString().padStart(2, '0');
    const ampm = isAm ? 'AM' : 'PM';
    clockElement.textContent = `${hours}:${minutes} ${ampm}`;
}
setInterval(updateClock, 1000);
updateClock();

passwordInput.addEventListener('input', (e) => {
    if (e.inputType === 'deleteContentBackward') {
        playSound('delete');
    } else {
        playSound('type');
    }
    passwordDisplay.innerHTML = '';
    const length = passwordInput.value.length;
    for (let i = 0; i < length; i++) {
        const dot = document.createElement('div');
        dot.className = 'password-dot';
        passwordDisplay.appendChild(dot);
    }

    if (length === 4) {
        if (passwordInput.value === 'asas') {
            failureCount = 0; // Reset on success
            passwordInput.disabled = true;
            
            // Slight delay before unlocking
            setTimeout(() => {
                playSound('success');
                material.uniforms.tDiffuse.value = desktopTexture;
                currentScreen = 'desktop';
                hasClosedMiniWindow = false; 

                passwordInput.style.display = 'none';
                passwordDisplay.style.display = 'none';
                passwordLabel.style.display = 'none';
                passwordInput.blur();
            }, 500);
        } else {
            // Incorrect password
            playSound('error');
            passwordInput.disabled = true;
            failureCount++;

            if (failureCount >= 3) {
                 setTimeout(() => {
                    playSound('glitch');
                    startDeadSound();
                    material.uniforms.tDiffuse.value = timedOutTexture;
                    currentScreen = 'timedOut';
                    passwordInput.style.display = 'none';
                    passwordDisplay.style.display = 'none';
                    passwordLabel.style.display = 'none';
                    clockElement.style.display = 'none';
                    introTextElement.textContent = ""; // Ensure no text overlay
                    passwordInput.blur();
                 }, 500);
            }
            
            // Shake effect logic
            let shakeDuration = 300; // ms
            let startTime = Date.now();
            
            function doShake() {
                let elapsed = Date.now() - startTime;
                if (elapsed < shakeDuration) {
                    // Shake intensity fades from 1.0 to 0.0
                    material.uniforms.uShake.value = 1.0 - (elapsed / shakeDuration);
                    requestAnimationFrame(doShake);
                } else {
                    material.uniforms.uShake.value = 0.0;
                    
                    if (failureCount >= 3) return;

                    // Reset input
                    passwordInput.value = '';
                    passwordDisplay.innerHTML = '';
                    passwordInput.disabled = false;
                    passwordInput.focus();
                }
            }
            doShake();
        }
    }
});

passwordInput.focus();

window.addEventListener('click', (event) => {
    if (currentScreen === 'intro') return;

    // Get mouse position relative to canvas
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // Keep password input focused on lockscreen
    if (currentScreen === 'lockscreen' && !passwordInput.disabled) {
        passwordInput.focus();
    }

    const intersects = raycaster.intersectObject(mesh);

    if (intersects.length > 0) {
        const uv = intersects[0].uv;
        console.log(`Clicked at x: ${uv.x.toFixed(2)}, y: ${uv.y.toFixed(2)}`);
        
        // Power Button - Global (Bottom Right)
        if (currentScreen !== 'lockscreen' && uv.x > 0.82 && uv.x < 0.90 && uv.y > 0.10 && uv.y < 0.20) {
            console.log("Power button clicked!");
            playSound('power_off');
            material.uniforms.tDiffuse.value = texture; // Back to lockscreen
            currentScreen = 'lockscreen';
            
            // Reset password UI
            failureCount = 0;
            clockElement.style.display = 'block';
            passwordInput.disabled = false;
            passwordInput.value = '';
            passwordInput.style.display = 'block';
            passwordInput.focus();
            
            passwordDisplay.innerHTML = '';
            passwordDisplay.style.display = 'flex';
            passwordLabel.style.display = 'block';
            adminPanel.style.display = 'none';
            return; // Stop processing to avoid other clicks
        }

        if (currentScreen === 'desktop' || currentScreen === 'desktop2') {
            
            // Mini Window Close X (Only on initial desktop 'screen.png')
            // Estimated coordinates for the X button of the mini window
            if (currentScreen === 'desktop' && uv.x > 0.80 && uv.x < 0.90 && uv.y > 0.50 && uv.y < 0.58) {
                console.log("Mini window X clicked!");
                playSound('close'); // Call close sound
                hasClosedMiniWindow = true;
                material.uniforms.tDiffuse.value = desktop2Texture;
                currentScreen = 'desktop2';
                return; // Stop processing
            }

            // Column 1 X Range (shortened from left as requested)
            const col1XMin = 0.12;
            const col1XMax = 0.20;
            
            // Column 2 X range (Terminal, shortened from left)
            const col2XMin = 0.26;
            const col2XMax = 0.34;
            
            // Row Y Ranges
            const row1YMin = 0.78, row1YMax = 0.88; // Computer, Top TextFile
            const row2YMin = 0.65, row2YMax = 0.75; // Yellow Folder, Mid TextFile
            const row3YMin = 0.53, row3YMax = 0.63; // Green Folder, Terminal
            const row4YMin = 0.41, row4YMax = 0.51; // Red Folder

            // --- Column 2 Interactions ---
            
            // Terminal (Col 2, Row 3)
            if (uv.x > col2XMin && uv.x < col2XMax && uv.y > row3YMin && uv.y < row3YMax - 0.02) {
                console.log("Terminal icon clicked!");
                playSound('open');
                material.uniforms.tDiffuse.value = terminalTexture;
                currentScreen = 'terminal';
            }
            // Clown Icon (Col 2, Row 4)
            else if (uv.x > col2XMin && uv.x < col2XMax && uv.y > row4YMin && uv.y < row4YMax - 0.02) {
                 console.log("Clown Icon clicked!");
                 playJimboSound();
            }
            // Text Files (Col 2, Row 1 & 2)
            else if (uv.x > col2XMin && uv.x < col2XMax && 
                    ((uv.y > row1YMin && uv.y < row1YMax - 0.03) || 
                     (uv.y > row2YMin && uv.y < row2YMax - 0.03))) {
                console.log("Text file icon clicked!");
                playSound('open');
                material.uniforms.tDiffuse.value = textFileTexture;
                currentScreen = 'textfile';
            }

            // --- Column 1 Interactions (Folders) ---

            // PC Icon (Col 1, Row 1)
            // Shifted slightly down (-0.02)
            else if (uv.x > col1XMin && uv.x < col1XMax && uv.y > row1YMin - 0.02 && uv.y < row1YMax - 0.04) {
                console.log("PC icon clicked!");
                playSound('open'); // PC Open sound
                if (isPcUnlocked) {
                    material.uniforms.tDiffuse.value = pcTexture;
                    currentScreen = 'pc';
                } else {
                    material.uniforms.tDiffuse.value = pcLockedTexture;
                    currentScreen = 'pclocked';
                    adminPanel.style.display = 'block';
                }
            }

            // Yellow Folder (Col 1, Row 2)
            else if (uv.x > col1XMin && uv.x < col1XMax && uv.y > row2YMin && uv.y < row2YMax - 0.02) {
                console.log("Yellow Folder clicked!");
                playSound('open');
                material.uniforms.tDiffuse.value = folderYellowTexture;
                currentScreen = 'folder';
            }
            // Green Folder (Col 1, Row 3)
            else if (uv.x > col1XMin && uv.x < col1XMax && uv.y > row3YMin && uv.y < row3YMax - 0.02) {
                console.log("Green Folder clicked!");
                playSound('open');
                material.uniforms.tDiffuse.value = folderGreenTexture;
                currentScreen = 'folder';
            }
            // Red Folder (Col 1, Row 4)
            else if (uv.x > col1XMin && uv.x < col1XMax && uv.y > row4YMin && uv.y < row4YMax - 0.02) {
                console.log("Red Folder clicked!");
                playSound('open');
                material.uniforms.tDiffuse.value = folderRedTexture;
                currentScreen = 'folder';
            }

        } else if (currentScreen === 'terminal' || currentScreen === 'textfile' || currentScreen === 'folder' || currentScreen === 'pc' || currentScreen === 'pclocked') {
            // Define clickable area for the close (X) button
            // Shifted slightly down and narrowed from left
            const closeArea = {
                xMin: 0.82,
                xMax: 0.87,
                yMin: 0.86,
                yMax: 0.92
            };

            if (uv.x > closeArea.xMin && uv.x < closeArea.xMax && 
                uv.y > closeArea.yMin && uv.y < closeArea.yMax) {
                 
                 console.log("Close button clicked!");
                 playSound('close'); // Call close sound
                 // Return to appropriate desktop state
                 if (hasClosedMiniWindow) {
                     material.uniforms.tDiffuse.value = desktop2Texture;
                     currentScreen = 'desktop2';
                 } else {
                     material.uniforms.tDiffuse.value = desktopTexture;
                     currentScreen = 'desktop';
                 }
                 adminPanel.style.display = 'none';
            }
        }
    }
});

const textContent = document.getElementById('textfile-content');
const miniWindowText = document.getElementById('mini-window-text');

function animate(){

requestAnimationFrame(animate);

material.uniforms.time.value += 0.01;
material.uniforms.uIsLockscreen.value = (currentScreen === 'lockscreen' || currentScreen === 'timedOut') ? 1.0 : 0.0;
material.uniforms.uIsTimedOut.value = (currentScreen === 'timedOut') ? 1.0 : 0.0;
textContent.style.display = (currentScreen === 'textfile') ? 'block' : 'none';
miniWindowText.style.display = (currentScreen === 'desktop') ? 'block' : 'none';
pcLabels.style.display = (currentScreen === 'pc') ? 'block' : 'none';

renderer.render(scene,camera);

}

const cursor = document.getElementById('custom-cursor');
document.addEventListener('mousemove', (e) => {
    // Offset by roughly half the cursor size so the tip is the point, or 0,0 depending on image
    // Standard cursors are top-left, so we might want:
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
});

animate();

</script>
